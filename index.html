<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkBoard — 專案管理工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{ --accent:#4f7cff; --accent2:#7c5cfc; --red:#e05060; --trans:all 0.2s ease; }
    [data-theme="dark"]{
      --bg:#0f1117; --surface:#181b24; --surface2:#1f2333; --border:#2a2f45;
      --text:#e2e8f0; --text2:#94a3b8; --muted:#64748b;
      --shadow:rgba(0,0,0,0.4); --modal-bg:rgba(0,0,0,0.65);
    }
    [data-theme="light"]{
      --bg:#f4f1ec; --surface:#faf8f5; --surface2:#ede9e2; --border:#d9d3c8;
      --text:#2c2a26; --text2:#5a5650; --muted:#8c877e;
      --shadow:rgba(0,0,0,0.08); --modal-bg:rgba(60,55,50,0.45);
    }
    *{box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;transition:var(--trans);}
    .font-mono{font-family:'DM Mono',monospace;} .font-display{font-family:'Sora',sans-serif;}

    /* SIDEBAR */
    .sidebar{background:var(--surface);border-right:1px solid var(--border);width:220px;min-height:100vh;height:100%;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:40;transition:var(--trans),transform 0.25s ease;}
    .sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .logo-mark{display:flex;align-items:center;gap:8px;}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-block;}
    .nav-section-label{padding:14px 20px 4px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-radius:8px;margin:1px 8px;cursor:pointer;transition:background 0.15s,color 0.15s;font-size:13.5px;color:var(--text2);}
    .nav-item:hover{background:var(--surface2);color:var(--text);}
    .nav-item.active{background:rgba(79,124,255,0.12);color:var(--accent);font-weight:500;}
    .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
    .sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:35;}
    .sidebar-overlay.open{display:block;}
    .icon-btn{width:22px;height:22px;border-radius:5px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:12px;transition:all 0.15s;flex-shrink:0;padding:0;}
    .icon-btn:hover{background:var(--surface2);color:var(--text);}

    /* THEME */
    .theme-toggle{width:36px;height:20px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);position:relative;cursor:pointer;transition:var(--trans);flex-shrink:0;}
    .theme-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--muted);transition:transform 0.2s ease,background 0.2s;}
    [data-theme="light"] .theme-toggle::after{transform:translateX(16px);background:var(--accent);}
    .theme-toggle-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}

    /* LAYOUT */
    .main-content{margin-left:220px;padding:28px;min-height:100vh;transition:margin 0.25s ease;}
    .topbar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--surface);border-bottom:1px solid var(--border);z-index:30;align-items:center;padding:0 16px;gap:12px;}
    .topbar-hamburger{width:32px;height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;flex-shrink:0;}
    .topbar-hamburger span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px;}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px var(--shadow);transition:var(--trans);}
    .card-title{font-family:'Sora',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}

    /* TAGS — dynamic via JS */
    .tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;letter-spacing:0.02em;white-space:nowrap;}

    /* TASKS */
    .task-item{display:flex;align-items:flex-start;gap:10px;padding:11px 6px;border-bottom:1px solid var(--border);transition:background 0.1s;cursor:pointer;border-radius:6px;}
    .task-item:last-child{border-bottom:none;}
    .task-item:hover{background:rgba(128,128,128,0.06);}
    .task-check{width:17px;height:17px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
    .task-check:hover{border-color:var(--accent);}
    .task-check.done{background:var(--accent);border-color:var(--accent);}
    .task-check.done::after{content:'✓';font-size:10px;color:#fff;font-weight:700;}
    .task-title{font-size:13.5px;line-height:1.5;flex:1;}
    .task-meta{font-size:11px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;}
    .priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px;}

    /* STATUS */
    .status{font-size:10px;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:600;}
    .status-handling{background:rgba(192,73,122,0.12);color:#c0497a;}
    .status-doing{background:rgba(200,150,14,0.12);color:#c8960e;}
    .status-review{background:rgba(79,124,255,0.12);color:var(--accent);}
    .status-done{background:rgba(46,184,114,0.12);color:#2eb872;}
    .status-pending{background:rgba(100,116,139,0.12);color:var(--muted);}

    /* GANTT */
    .gantt-row{display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center;margin-bottom:9px;}
    .gantt-label{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gantt-track{background:var(--surface2);border-radius:4px;height:20px;position:relative;}
    .gantt-bar{position:absolute;height:100%;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:9.5px;font-weight:600;white-space:nowrap;overflow:hidden;font-family:'DM Mono',monospace;}
    .gantt-today{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--red);opacity:0.7;border-radius:2px;}

    /* CALENDAR */
    .cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3px 1px;border-radius:6px;font-size:11.5px;cursor:pointer;position:relative;transition:background 0.12s;}
    .cal-day:hover{background:var(--surface2);}
    .cal-day.today{background:rgba(79,124,255,0.15);color:var(--accent);font-weight:700;}
    .cal-day.has-event::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:10px;}
    .cal-day.has-company-event::after{background:#c0497a;}
    .cal-day.other-month{color:var(--muted);opacity:0.35;pointer-events:none;}

    /* BUTTONS */
    .add-btn{width:26px;height:26px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:15px;transition:all 0.15s;flex-shrink:0;}
    .add-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
    .btn-primary{background:var(--accent);color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;transition:opacity 0.15s;}
    .btn-primary:hover{opacity:0.85;}
    .btn-ghost{background:transparent;color:var(--muted);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;}
    .btn-ghost:hover{background:var(--surface2);color:var(--text);}
    .btn-danger{background:rgba(224,80,96,0.1);color:var(--red);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid rgba(224,80,96,0.25);font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;}
    .btn-danger:hover{background:rgba(224,80,96,0.2);}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:var(--modal-bg);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:500px;max-width:100%;box-shadow:0 8px 32px var(--shadow);max-height:90vh;overflow-y:auto;}
    .modal input,.modal textarea,.modal select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;font-size:13px;width:100%;outline:none;font-family:'Noto Sans TC',sans-serif;transition:border-color 0.15s;}
    .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent);}
    .modal label{font-size:11.5px;color:var(--muted);margin-bottom:4px;display:block;}

    /* NOTE CARD */
    .note-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 38px 11px 20px;font-size:13px;line-height:1.65;position:relative;}
    .note-tag-bar{position:absolute;top:10px;left:10px;width:3px;bottom:10px;border-radius:2px;}
    .note-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s;}
    .note-card:hover .note-actions{opacity:1;}

    /* TODO ITEM — action buttons */
    .todo-item{display:flex;align-items:center;gap:3px;border-bottom:1px solid var(--border);padding:2px 0;}
    .todo-item:last-child{border-bottom:none;}
    .todo-label{display:flex;align-items:center;gap:3px;flex:1;cursor:pointer;padding:6px 0;}
    .todo-item-actions{display:flex;gap:2px;opacity:0;transition:opacity 0.15s;}
    .todo-item:hover .todo-item-actions{opacity:1;}

    /* TAG PILLS */
    .tag-pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
    .tag-pill{padding:4px 13px;border-radius:20px;font-size:11.5px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all 0.15s;user-select:none;}

    /* TAG MANAGER */
    .tag-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
    .tag-row:last-child{border-bottom:none;}
    .color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;position:relative;overflow:hidden;}
    .color-swatch input[type=color]{position:absolute;inset:-4px;width:calc(100%+8px);height:calc(100%+8px);border:none;cursor:pointer;opacity:0;}

    /* EVENT CHIP */
    .event-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;margin-bottom:4px;}
    .event-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

    /* SCROLLBAR */
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* TOAST */
    .toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 15px;font-size:13px;box-shadow:0 4px 16px var(--shadow);opacity:0;transform:translateY(6px);transition:all 0.2s;z-index:500;}
    .toast.show{opacity:1;transform:translateY(0);}

    /* PAGE SECTIONS */
    .page-section{display:none;animation:fadeIn 0.18s ease;}
    .page-section.active{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* FULL-PAGE GANTT */
    #page-gantt .gantt-row{grid-template-columns:180px 1fr;}
    #page-gantt .gantt-bar{font-size:11px;padding:0 10px;}
    #page-gantt .gantt-track{height:28px;}

    /* FULL-PAGE CALENDAR */
    #page-calendar .cal-day{font-size:13px;padding:6px 4px;min-height:52px;justify-content:flex-start;}
    #page-calendar .cal-day.has-event::after{bottom:6px;width:5px;height:5px;}
    #page-calendar .cal-day.today{font-weight:700;}

    /* FULL-PAGE TODO */
    #page-todo .todo-item{padding:4px 0;}
    #page-todo .todo-label{font-size:14px;}

    /* FULL-PAGE TASKS */
    #page-tasks .task-item{padding:14px 8px;}
    #page-tasks .task-title{font-size:14px;}

    /* RESPONSIVE */
    @media(max-width:768px){
      .topbar{display:flex;} .main-content{margin-left:0;padding:72px 14px 24px;}
      .sidebar{transform:translateX(-100%);} .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px var(--shadow);}
      .grid-main{grid-template-columns:1fr!important;} .grid-bottom{grid-template-columns:1fr!important;}
      .grid-stats{grid-template-columns:repeat(3,1fr)!important;}
      .gantt-row{grid-template-columns:80px 1fr;} .gantt-bar{font-size:8px;padding:0 4px;}
      .stat-card-icon{display:none;} .card{padding:14px 16px;} .modal{border-radius:10px;padding:20px;}
    }
    @media(max-width:480px){
      .grid-stats{grid-template-columns:1fr 1fr!important;}
      .grid-stats .card:last-child{grid-column:span 2;}
    }
  </style>
</head>
<body>

<!-- Mobile Topbar -->
<div class="topbar" id="topbar">
  <div class="topbar-hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
  <div class="flex items-center gap-2 flex-1">
    <span class="logo-dot"></span>
    <span class="font-display font-bold text-sm" style="color:var(--text)">WorkBoard</span>
  </div>
  <div class="theme-toggle-wrap">
    <span id="theme-icon-mobile">☀️</span>
    <div class="theme-toggle" onclick="toggleTheme()"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <span class="logo-dot"></span>
      <span class="font-display font-bold text-sm tracking-wide" style="color:var(--text)">WorkBoard</span>
    </div>
    <div class="theme-toggle-wrap">
      <span id="theme-icon-desk" style="font-size:13px">☀️</span>
      <div class="theme-toggle" onclick="toggleTheme()"></div>
    </div>
  </div>
  <nav class="flex-1 overflow-y-auto py-2">
    <div class="nav-section-label">主要</div>
    <div class="nav-item active" data-page="overview" onclick="switchPage('overview')"><span class="nav-icon">⊞</span> 總覽</div>
    <div class="nav-item" data-page="tasks"    onclick="switchPage('tasks')"><span class="nav-icon">◷</span> 任務</div>
    <div class="nav-item" data-page="gantt"    onclick="switchPage('gantt')"><span class="nav-icon">≡</span> 甘特圖</div>
    <div class="nav-item" data-page="todo"     onclick="switchPage('todo')"><span class="nav-icon">☑</span> 待辦</div>
    <div class="nav-item" data-page="calendar" onclick="switchPage('calendar')"><span class="nav-icon">▦</span> 日曆</div>

    <!-- 標籤區塊：標題旁加齒輪 -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px 4px 20px;">
      <span style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">標籤</span>
      <button class="icon-btn" onclick="openTagManager()" title="管理標籤" style="width:18px;height:18px;font-size:13px;">⚙</button>
    </div>
    <div id="sidebar-tags"></div>
  </nav>
  <div class="sidebar-footer">
    <div class="w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-white font-bold text-xs" style="background:linear-gradient(135deg,#4f7cff,#7c5cfc)">V</div>
    <span style="font-size:13px;color:var(--text2)">Victor</span>
  </div>
</aside>

<!-- Main -->
<div class="main-content">

  <!-- Page Header (shared) -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <div class="font-display font-bold text-xl" style="color:var(--text)" id="page-title">工作總覽</div>
      <div class="text-xs mt-1" style="color:var(--muted)">
        <span class="font-mono" id="header-date"></span> — <span id="header-stats"></span>
      </div>
    </div>
    <div id="header-actions">
      <button class="btn-primary flex items-center gap-1" onclick="openTaskModal(null)" style="font-size:13px;padding:7px 14px">＋ 新增任務</button>
    </div>
  </div>

  <!-- ===== PAGE: 總覽 ===== -->
  <div class="page-section active" id="page-overview">
    <!-- Stats -->
    <div class="grid grid-stats grid-cols-3 gap-3 mb-5">
      <div class="card flex items-center gap-3">
        <div class="stat-card-icon w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style="background:rgba(79,124,255,0.12)">📋</div>
        <div><div class="font-display font-bold text-2xl" style="color:var(--text)" id="stat-total">0</div><div style="font-size:11px;color:var(--muted)">總任務</div></div>
      </div>
      <div class="card flex items-center gap-3">
        <div class="stat-card-icon w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style="background:rgba(200,150,14,0.12)">⚡</div>
        <div><div class="font-display font-bold text-2xl" style="color:var(--text)" id="stat-doing">0</div><div style="font-size:11px;color:var(--muted)">進行中</div></div>
      </div>
      <div class="card flex items-center gap-3">
        <div class="stat-card-icon w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style="background:rgba(192,73,122,0.12)">🕐</div>
        <div><div class="font-display font-bold text-2xl" style="color:var(--text)" id="stat-handling">0</div><div style="font-size:11px;color:var(--muted)">待處理</div></div>
      </div>
    </div>
    <!-- Tasks + Gantt -->
    <div class="grid grid-main grid-cols-2 gap-4 mb-4">
      <div class="card">
        <div class="card-title"><span>進行中任務</span><div class="add-btn" onclick="openTaskModal(null)">＋</div></div>
        <div id="tasks-container-overview"></div>
      </div>
      <div class="card">
        <div class="card-title">
          <span id="gantt-title">甘特圖</span>
          <span class="font-mono" style="font-size:10px;color:var(--muted)" id="gantt-today-label"></span>
        </div>
        <div class="gantt-row" style="margin-bottom:6px">
          <div></div>
          <div class="flex" style="font-size:9px;color:var(--muted);font-family:'DM Mono',monospace">
            <span style="flex:1;text-align:left">1</span><span style="flex:1;text-align:center">8</span>
            <span style="flex:1;text-align:center">15</span><span style="flex:1;text-align:center">22</span>
            <span style="flex:1;text-align:right" id="gantt-dN">31</span>
          </div>
        </div>
        <div id="gantt-container-overview"></div>
      </div>
    </div>
    <!-- Todo + Notes + Calendar -->
    <div class="grid grid-bottom grid-cols-3 gap-4">
      <div class="card">
        <div class="card-title"><span>待辦清單</span><div class="add-btn" onclick="openTodoModal(null)">＋</div></div>
        <div id="todo-container-overview"></div>
      </div>
      <div class="card">
        <div class="card-title"><span>備註 / 筆記</span><div class="add-btn" onclick="openNoteModal(null)">＋</div></div>
        <div id="notes-container-overview" class="flex flex-col gap-3"></div>
      </div>
      <div class="card">
        <div class="card-title">
          <span>日曆</span>
          <div class="flex items-center gap-2">
            <button class="add-btn" onclick="changeMonth(-1)">‹</button>
            <span class="font-mono" style="font-size:11px;color:var(--muted)" id="cal-header-overview"></span>
            <button class="add-btn" onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div class="grid grid-cols-7 mb-1" id="cal-dow-overview">
          <div class="cal-day" style="font-size:10px;font-weight:700;color:var(--muted);pointer-events:none">日</div>
          <div class="cal-day" style="font-size:10px;font-weight:700;color:var(--muted);pointer-events:none">一</div>
          <div class="cal-day" style="font-size:10px;font-weight:700;color:var(--muted);pointer-events:none">二</div>
          <div class="cal-day" style="font-size:10px;font-weight:700;color:var(--muted);pointer-events:none">三</div>
          <div class="cal-day" style="font-size:10px;font-weight:700;color:var(--muted);pointer-events:none">四</div>
          <div class="cal-day" style="font-size:10px;font-weight:700;color:var(--muted);pointer-events:none">五</div>
          <div class="cal-day" style="font-size:10px;font-weight:700;color:var(--muted);pointer-events:none">六</div>
        </div>

<script>
// ============================================================
// THEME
// ============================================================
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  const icon = isLight ? '🌙' : '☀️';
  document.getElementById('theme-icon-desk').textContent = icon;
  document.getElementById('theme-icon-mobile').textContent = icon;
  try { localStorage.setItem('wb-theme', isLight ? 'dark' : 'light'); } catch(e){}
}
(function(){
  try {
    const saved = localStorage.getItem('wb-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      const icon = saved === 'dark' ? '🌙' : '☀️';
      window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('theme-icon-desk').textContent = icon;
        document.getElementById('theme-icon-mobile').textContent = icon;
      });
    }
  } catch(e){}
})();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ============================================================
// PAGE SWITCHING
// ============================================================
const pageConfig = {
  overview: { title:'工作總覽',   action: () => `<button class="btn-primary flex items-center gap-1" onclick="openTaskModal(null)" style="font-size:13px;padding:7px 14px">＋ 新增任務</button>` },
  tasks:    { title:'任務',        action: () => `<button class="btn-primary flex items-center gap-1" onclick="openTaskModal(null)" style="font-size:13px;padding:7px 14px">＋ 新增任務</button>` },
  gantt:    { title:'甘特圖',      action: () => '' },
  todo:     { title:'待辦清單',    action: () => `<button class="btn-primary flex items-center gap-1" onclick="openTodoModal(null)" style="font-size:13px;padding:7px 14px">＋ 新增待辦</button>` },
  calendar: { title:'日曆',        action: () => '' },
};

let currentPage = 'overview';

function switchPage(page) {
  if (currentPage === page) return;
  currentPage = page;

  // Sidebar active
  document.querySelectorAll('.nav-item[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  // Page sections
  document.querySelectorAll('.page-section').forEach(el => {
    el.classList.remove('active');
  });
  document.getElementById(`page-${page}`).classList.add('active');

  // Header
  const cfg = pageConfig[page];
  document.getElementById('page-title').textContent = cfg.title;
  document.getElementById('header-actions').innerHTML = cfg.action();

  // Re-render the page content
  if (page === 'overview')  { renderOverview(); }
  if (page === 'tasks')     { renderTasksPage(); }
  if (page === 'gantt')     { renderGanttPage(); }
  if (page === 'todo')      { renderTodosPage(); }
  if (page === 'calendar')  { renderCalendarPage(); }

  closeSidebar();
}

// ============================================================
// GANTT PAGE STATE (separate month control)
// ============================================================
let ganttPageYear, ganttPageMonth;

function initGanttPage() {
  const now = new Date();
  ganttPageYear  = now.getFullYear();
  ganttPageMonth = now.getMonth();
}

function changeGanttMonth(dir) {
  ganttPageMonth += dir;
  if (ganttPageMonth > 11) { ganttPageMonth = 0; ganttPageYear++; }
  if (ganttPageMonth < 0)  { ganttPageMonth = 11; ganttPageYear--; }
  renderGanttPage();
}

function renderGanttPage() {
  const y = ganttPageYear, m = ganttPageMonth;
  const now = new Date();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const isCurrentMonth = y === now.getFullYear() && m === now.getMonth();
  const todayPct = isCurrentMonth ? ((now.getDate()-1)/daysInMonth*100).toFixed(1) : null;

  document.getElementById('gantt-page-title').textContent  = `甘特圖 — ${y}年 ${m+1}月`;
  document.getElementById('gantt-page-header').textContent = `${y} / ${String(m+1).padStart(2,'0')}`;
  document.getElementById('gantt-page-today').textContent  = isCurrentMonth ? `今日 ${m+1}/${now.getDate()}` : '';
  document.getElementById('gantt-page-dN').textContent     = daysInMonth;

  const c = document.getElementById('gantt-container-page'); c.innerHTML = '';
  let ci = 0;
  const mStart = new Date(y,m,1), mEnd = new Date(y,m+1,0);

  Object.values(taskStore).forEach(t => {
    if (!t.start && !t.end) return;
    const sD = t.start ? new Date(t.start) : null, eD = t.end ? new Date(t.end) : null;
    if (sD && sD > mEnd) return; if (eD && eD < mStart) return;
    const s = sD ? Math.max(0,(sD.getDate()-1)/daysInMonth*100) : 0;
    const e = eD ? Math.min(100,eD.getDate()/daysInMonth*100) : s+10;
    const w = Math.max(e-s,4);
    const col = ganttColors[ci%ganttColors.length]; ci++;
    const tg = getTag(t.tag);
    const lbl = t.startFmt && t.endFmt ? `${t.startFmt}→${t.endFmt}` : t.startFmt||t.endFmt||'';
    const todayLine = todayPct !== null ? `<div class="gantt-today" style="left:${todayPct}%"></div>` : '';
    c.insertAdjacentHTML('beforeend', `
      <div class="gantt-row" style="cursor:pointer" onclick="openTaskModal(${t.id})">
        <div class="gantt-label" title="${t.name}" style="color:var(--text2)">${t.name}</div>
        <div class="gantt-track">
          ${todayLine}
          <div class="gantt-bar" style="left:${s.toFixed(1)}%;width:${w.toFixed(1)}%;background:linear-gradient(90deg,${col},${col.replace('0.85','0.45')});color:#fff">${lbl}</div>
        </div>
      </div>`);
  });
  if (!c.children.length) c.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:12px 0">此月份沒有任何任務的日期範圍</div>';
}

// ============================================================
// TASKS PAGE — filtered list
// ============================================================
function renderTasksPage() {
  // Rebuild tag filter options
  const tagSel = document.getElementById('task-filter-tag');
  if (tagSel) {
    const cur = tagSel.value;
    tagSel.innerHTML = '<option value="">全部標籤</option>';
    tags.forEach(t => tagSel.insertAdjacentHTML('beforeend',`<option value="${t.id}">${t.name}</option>`));
    tagSel.value = cur;
  }

  const statusFilter = document.getElementById('task-filter-status')?.value || '';
  const tagFilter    = document.getElementById('task-filter-tag')?.value    || '';

  const c = document.getElementById('tasks-container-page'); c.innerHTML = '';
  const ids = Object.keys(taskStore).map(Number).sort((a,b)=>a-b)
    .filter(id => {
      const t = taskStore[id];
      if (statusFilter && t.status !== statusFilter) return false;
      if (tagFilter    && t.tag    !== tagFilter)    return false;
      return true;
    });

  if (!ids.length) {
    c.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:16px 0;text-align:center">沒有符合條件的任務</div>';
    return;
  }
  ids.forEach(id => {
    const t = taskStore[id]; const tg = getTag(t.tag);
    const dateStr = t.startFmt && t.endFmt ? `${t.startFmt} → ${t.endFmt}`
      : t.startFmt ? `起 ${t.startFmt}` : t.endFmt ? `迄 ${t.endFmt}` : '—';
    const isDone = t.status === 'done';
    c.insertAdjacentHTML('beforeend', `
    <div class="task-item" data-task-id="${id}" onclick="openTaskModal(${id})">
      <div class="priority-dot" style="background:${tg.color}"></div>
      <div class="task-check${isDone?' done':''}" onclick="event.stopPropagation();toggleTask(this,${id})"></div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="task-title font-medium${isDone?' line-through':''}" style="${isDone?'opacity:0.4':''}">${t.name}</span>
          <span class="status ${statusClass[t.status]||'status-pending'}">${statusLabel[t.status]||t.status}</span>
        </div>
        <div class="flex items-center gap-2 mt-1 flex-wrap">
          <span class="tag tag-${t.tag}">${tg.name}</span>
          <span class="task-meta">${dateStr}</span>
          ${t.memo ? `<span class="task-meta" style="color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.memo}</span>` : ''}
        </div>
      </div>
      <button class="text-xs opacity-20 hover:opacity-70 transition-opacity flex-shrink-0"
              onclick="event.stopPropagation();removeTask(${id})"
              style="background:none;border:none;cursor:pointer;color:var(--text)">✕</button>
    </div>`);
  });
}

// ============================================================
// TODO PAGE — filtered list
// ============================================================
function renderTodosPage() {
  // Rebuild tag filter
  const tagSel = document.getElementById('todo-filter-tag');
  if (tagSel) {
    const cur = tagSel.value;
    tagSel.innerHTML = '<option value="">全部標籤</option>';
    tags.forEach(t => tagSel.insertAdjacentHTML('beforeend',`<option value="${t.id}">${t.name}</option>`));
    tagSel.value = cur;
  }
  const tagFilter  = document.getElementById('todo-filter-tag')?.value || '';
  const hideDone   = document.getElementById('todo-hide-done')?.checked || false;

  const c = document.getElementById('todo-container-page'); c.innerHTML = '';
  const filtered = todoStore.filter(item => {
    if (tagFilter && item.tag !== tagFilter) return false;
    if (hideDone  && item.done)              return false;
    return true;
  });
  if (!filtered.length) {
    c.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:16px 0;text-align:center">沒有符合條件的待辦</div>';
    return;
  }
  filtered.forEach(item => {
    const tg = getTag(item.tag);
    c.insertAdjacentHTML('beforeend', `
      <div class="todo-item" data-todo-id="${item.id}">
        <label class="todo-label">
          <input type="checkbox" class="w-4 h-4 rounded flex-shrink-0" ${item.done?'checked':''}
                 onchange="toggleTodo(${item.id},this.checked)" style="accent-color:var(--accent);flex-shrink:0" />
          <span class="text-sm flex-1${item.done?' line-through':''}" style="${item.done?'opacity:0.4':''};padding-left:4px">${item.text}</span>
          <span class="tag tag-${item.tag}" style="margin:0 4px">${tg.name}</span>
        </label>
        <div class="todo-item-actions">
          <button class="icon-btn" onclick="openTodoModal(${item.id})" title="編輯">✏️</button>
          <button class="icon-btn" onclick="removeTodo(${item.id})" title="刪除" style="font-size:11px;color:var(--muted)">✕</button>
        </div>
      </div>`);
  });
}

// ============================================================
// CALENDAR PAGE — larger grid, side event panel
// ============================================================
function renderCalendarPage() {
  const now = new Date();
  const header = document.getElementById('cal-header-page');
  if (header) header.textContent = `${calYear} / ${String(calMonth+1).padStart(2,'0')}`;

  const grid = document.getElementById('calendar-grid-page'); if (!grid) return;
  grid.innerHTML = '';
  const today    = new Date();
  const firstDay = new Date(calYear,calMonth,1).getDay();
  const days     = new Date(calYear,calMonth+1,0).getDate();
  const prevDays = new Date(calYear,calMonth,0).getDate();

  for (let i=firstDay-1;i>=0;i--) { const d=document.createElement('div'); d.className='cal-day other-month'; d.textContent=prevDays-i; grid.appendChild(d); }
  for (let d=1;d<=days;d++) {
    const div=document.createElement('div'); div.className='cal-day'; div.textContent=d;
    const key=`${calYear}-${calMonth+1}-${d}`;
    if (d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear()) div.classList.add('today');
    if (calEvents[key]) div.classList.add(calEvents[key].some(e=>e.tag==='event')?'has-company-event':'has-event');
    const cd=d; div.onclick=()=>calPageDayClick(cd); grid.appendChild(div);
  }
  const rem=(firstDay+days)%7===0?0:7-(firstDay+days)%7;
  for (let d=1;d<=rem;d++) { const div=document.createElement('div'); div.className='cal-day other-month'; div.textContent=d; grid.appendChild(div); }
}

function calPageDayClick(d) {
  // Reuse existing selectedCalDate logic
  selectedCalDate = { y: calYear, m: calMonth+1, d };
  const key  = `${calYear}-${calMonth+1}-${d}`;
  const evts = calEvents[key] || [];
  const title = document.getElementById('cal-page-event-title');
  const list  = document.getElementById('cal-page-event-list');
  if (!title||!list) return;
  title.textContent = `${calYear}/${calMonth+1}/${d}`;
  list.innerHTML = '';

  if (!evts.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">此日期無事件</div>';
  } else {
    evts.forEach((ev,idx) => {

      list.insertAdjacentHTML('beforeend', `
        <div class="event-chip" style="margin-bottom:6px">
          <span class="event-dot" style="background:${tg.color}"></span>
          <span style="flex:1;font-size:12px">${ev.name}</span>

          <button onclick="removeCalEvent('${key}',${idx});renderCalendarPage();calPageDayClick(${d})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;opacity:0.5;margin-left:4px">✕</button>

  addBtn.textContent = '＋ 新增到此日期';

// hex → rgba with alpha
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

  { id:'wp',     name:'WordPress',color:'#d06828' },
  { id:'event',  name:'公司活動', color:'#c0497a' },
];

function getTag(id) { return tags.find(t => t.id === id) || { id, name: id, color:'#8c877e' }; }

// 動態 CSS：為每個標籤產生 .tag-xxx 樣式
function applyTagStyles() {
  let css = '';
  tags.forEach(t => {
    const bg   = hexToRgba(t.color, 0.13);
    const bdr  = hexToRgba(t.color, 0.28);
    const pillBg = hexToRgba(t.color, 0.18);
    css += `.tag-${t.id}{background:${bg};color:${t.color};border:1px solid ${bdr};}`;
    css += `.tag-pill.selected-${t.id}{background:${pillBg};color:${t.color};border-color:${t.color};}`;
  });
  let el = document.getElementById('dynamic-tag-styles');
  if (!el) { el = document.createElement('style'); el.id = 'dynamic-tag-styles'; document.head.appendChild(el); }
  el.textContent = css;
}

// ============================================================
function _renderGanttInto(containerId, y, m) {
  const daysInMonth = new Date(y,m+1,0).getDate();
  const now = new Date();
  const isCurrentMonth = y===now.getFullYear()&&m===now.getMonth();
  const todayPct = isCurrentMonth ? ((now.getDate()-1)/daysInMonth*100).toFixed(1) : null;
  const c = document.getElementById(containerId); if (!c) return; c.innerHTML = '';
  let ci = 0;
  const mS=new Date(y,m,1), mE=new Date(y,m+1,0);
  Object.values(taskStore).forEach(t => {
    if (!t.start && !t.end) return;
    const sD=t.start?new Date(t.start):null, eD=t.end?new Date(t.end):null;
    if (sD&&sD>mE) return; if (eD&&eD<mS) return;
    const s=sD?Math.max(0,(sD.getDate()-1)/daysInMonth*100):0;
    const e=eD?Math.min(100,eD.getDate()/daysInMonth*100):s+10;
    const w=Math.max(e-s,4);
    const col=ganttColors[ci%ganttColors.length]; ci++;
    const lbl=t.startFmt&&t.endFmt?`${t.startFmt}→${t.endFmt}`:t.startFmt||t.endFmt||'';
    const todayLine=todayPct!==null?`<div class="gantt-today" style="left:${todayPct}%"></div>`:'';
    c.insertAdjacentHTML('beforeend',`
      <div class="gantt-row">
        <div class="gantt-label" title="${t.name}">${t.name}</div>
        <div class="gantt-track">
          ${todayLine}
          <div class="gantt-bar" style="left:${s.toFixed(1)}%;width:${w.toFixed(1)}%;background:linear-gradient(90deg,${col},${col.replace('0.85','0.45')});color:#fff">${lbl}</div>
        </div>
      </div>`);
  });
  if (!c.children.length) c.innerHTML='<div style="font-size:12px;color:var(--muted)">新增含有日期的任務後即自動顯示</div>';
}

function renderGantt() {  // overview gantt
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  document.getElementById('gantt-title').textContent       = `甘特圖 — ${m+1}月`;
  document.getElementById('gantt-today-label').textContent = `今日 ${m+1}/${now.getDate()}`;
  document.getElementById('gantt-dN').textContent          = new Date(y,m+1,0).getDate();

}

function _renderCalendarInto(gridId, headerId, eventPanelId, eventTitleId, eventListId, dayClickFn) {
  const grid=document.getElementById(gridId), header=document.getElementById(headerId);
  if (!grid) return;
  grid.innerHTML='';
  if (header) header.textContent=`${calYear} / ${String(calMonth+1).padStart(2,'0')}`;
  const today=new Date(), firstDay=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate(), prevDays=new Date(calYear,calMonth,0).getDate();
  for (let i=firstDay-1;i>=0;i--){const d=document.createElement('div');d.className='cal-day other-month';d.textContent=prevDays-i;grid.appendChild(d);}
  for (let d=1;d<=days;d++){
    const div=document.createElement('div');div.className='cal-day';div.textContent=d;
    const key=`${calYear}-${calMonth+1}-${d}`;
    if(d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear()) div.classList.add('today');
    if(calEvents[key]) div.classList.add(calEvents[key].some(e=>e.tag==='event')?'has-company-event':'has-event');
    const cd=d; div.onclick=()=>dayClickFn(cd,eventPanelId,eventTitleId,eventListId); grid.appendChild(div);
  }
  const rem=(firstDay+days)%7===0?0:7-(firstDay+days)%7;
  for(let d=1;d<=rem;d++){const div=document.createElement('div');div.className='cal-day other-month';div.textContent=d;grid.appendChild(div);}
}

function renderCalendar() { // overview calendar
  _renderCalendarInto('calendar-grid-overview','cal-header-overview','cal-event-panel-overview','cal-event-title-overview','cal-event-list-overview', calOverviewDayClick);
}

function renderCalendarOverview() { renderCalendar(); }

function calOverviewDayClick(d, panelId, titleId, listId) {
  selectedCalDate={y:calYear,m:calMonth+1,d};
  const key=`${calYear}-${calMonth+1}-${d}`, evts=calEvents[key]||[];
  const list=document.getElementById(listId), panel=document.getElementById(panelId);
  document.getElementById(titleId).textContent=`${calYear}/${calMonth+1}/${d}`;
  list.innerHTML='';
  if(!evts.length){
    const msg=document.createElement('div');msg.style.cssText='font-size:11px;color:var(--muted);margin-bottom:6px';msg.textContent='此日期無事件';list.appendChild(msg);
  } else {
    evts.forEach((ev,idx)=>{
      const tg=getTag(ev.tag),chip=document.createElement('div');chip.className='event-chip';
      chip.innerHTML=`<span class="event-dot" style="background:${tg.color}"></span><span style="flex:1;font-size:11.5px">${ev.name}</span><span class="tag tag-${ev.tag}">${tg.name}</span><button onclick="removeCalEvent('${key}',${idx})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;opacity:0.5;margin-left:4px">✕</button>`;
      list.appendChild(chip);
    });
  }
  const addBtn=document.createElement('button');addBtn.className='btn-primary mt-2';
  addBtn.style.cssText='font-size:11.5px;padding:5px 12px;width:100%';addBtn.textContent='＋ 新增到此日期';addBtn.onclick=openCalModal;list.appendChild(addBtn);
  if(panel) panel.style.display='block';
}

function changeMonth(dir) {
  calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;}
  if(currentPage==='overview') renderCalendar();
  else if(currentPage==='calendar') renderCalendarPage();
  const panelO=document.getElementById('cal-event-panel-overview');
  if(panelO) panelO.style.display='none';
  selectedCalDate=null;
}

function calDayClick(d) {
  // alias → calOverviewDayClick
  calOverviewDayClick(d,'cal-event-panel-overview','cal-event-title-overview','cal-event-list-overview');
}

// removeCalEvent → defined later as async API version

function openCalModal() {
  if (!selectedCalDate) return;
  const {y,m,d}=selectedCalDate;
  document.getElementById('cal-modal-date').textContent=`${y} / ${String(m).padStart(2,'0')} / ${String(d).padStart(2,'0')}`;
  document.getElementById('cal-item-name').value='';
  renderPillsIn('cal-tag-pills','cal',false); pillState.cal=null;
  document.getElementById('cal-status-row').style.display='block';
  openModal('calModal');
}

// addFromCalendar / removeCalEvent → defined later as async API versions

// ============================================================
// MODAL / TOAST
// ============================================================
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target===o) o.classList.remove('open'); });
});

let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

// ============================================================
// API — Apps Script 串接
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyJ5vNb9Ovq3LEVmEMzWddOT25rKKTq4UN2VU9C2dDTVsGQBGvWZc7IT7tBuyd-Cww/exec';

async function apiGet(action) {
  const res = await fetch(`${API_URL}?action=${action}`);
  return res.json();
}

async function apiPost(action, payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action, payload }),
  });
  return res.json();
}

// ============================================================
// LOADING OVERLAY
// ============================================================
function showLoading(msg = '載入資料中…') {
  let el = document.getElementById('loading-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loading-overlay';
    el.style.cssText = `
      position:fixed;inset:0;background:var(--bg);z-index:999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
      transition:opacity 0.3s;
    `;
    el.innerHTML = `
      <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
                  border-radius:50%;animation:spin 0.7s linear infinite"></div>
      <div id="loading-msg" style="font-size:13px;color:var(--muted)">${msg}</div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
    document.body.appendChild(el);
  }
  el.style.opacity = '1';
  el.style.display = 'flex';
  document.getElementById('loading-msg').textContent = msg;
}

function hideLoading() {
  const el = document.getElementById('loading-overlay');
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(() => { el.style.display = 'none'; }, 300);
}

// ============================================================
// INIT — 從 Sheets 載入
// ============================================================
async function init() {
  applyTagStyles();
  renderSidebarTags();
  renderAllPills();
  initCal();
  initGanttPage();
  showLoading('連線至資料庫…');

  try {
    const data = await apiGet('loadAll');

    // ── Tasks ──────────────────────────────────
    (data.tasks || []).forEach(t => {
      const id = Number(t.id);
      if (id >= taskIdCounter) taskIdCounter = id + 1;
      const startFmt = t.startDate ? String(t.startDate).slice(5).replace('-','/') : '';
      const endFmt   = t.endDate   ? String(t.endDate).slice(5).replace('-','/')   : '';
      taskStore[id] = {
        id, name: t.name, tag: t.tag, status: t.status,
        start: t.startDate || '', end: t.endDate || '',
        startFmt, endFmt, memo: t.memo || ''
      };
    });

    // ── Todos ──────────────────────────────────
    (data.todos || []).forEach(t => {
      const id = Number(t.id);
      if (id >= todoIdCounter) todoIdCounter = id + 1;
      todoStore.push({
        id, text: t.text, tag: t.tag,
        done: t.done === true || t.done === 'TRUE' || t.done === true
      });
    });

    // ── Notes ──────────────────────────────────
    (data.notes || []).forEach(n => {
      const id = Number(n.id);
      if (id >= noteIdCounter) noteIdCounter = id + 1;
      noteStore.push({ id, text: n.content, tag: n.tag, date: n.date || '' });
    });

    // ── CalEvents ──────────────────────────────
    (data.calEvents || []).forEach(ev => {
      if (!ev.date) return;
      const d = new Date(ev.date);
      if (isNaN(d)) return;
      const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
      if (!calEvents[key]) calEvents[key] = [];
      calEvents[key].push({ id: Number(ev.id), name: ev.name, tag: ev.tag });
    });

  } catch(err) {
    showToast('⚠ 資料載入失敗，請確認網路連線');
    console.error(err);
  }

  // 渲染所有區塊
  renderAllTaskCards();
  renderTodos();
  renderNotes();
  renderGantt();
  renderCalendar();
  updateStats();
  hideLoading();
}

// ============================================================
// API-CONNECTED TASK OPERATIONS
// ============================================================
async function submitTask() {
  const name = document.getElementById('m-task-name').value.trim();
  if (!name) { showToast('⚠ 請輸入任務名稱'); return; }
  const tag      = pillState.task || tags[0].id;
  const status   = document.getElementById('m-task-status').value;
  const start    = document.getElementById('m-task-start').value;
  const end      = document.getElementById('m-task-end').value;
  const memo     = document.getElementById('m-task-memo').value.trim();
  const startFmt = start ? start.slice(5).replace('-','/') : '';
  const endFmt   = end   ? end.slice(5).replace('-','/')   : '';

  if (editingTaskId !== null) {
    // UPDATE
    const updated = { id: editingTaskId, name, tag, status, startDate: start, endDate: end, memo };
    try {
      await apiPost('updateTask', updated);
      Object.assign(taskStore[editingTaskId], { name, tag, status, start, end, startFmt, endFmt, memo });
      showToast('✅ 任務已更新');
    } catch(e) { showToast('⚠ 更新失敗'); return; }
  } else {
    // CREATE
    try {
      const res = await apiPost('addTask', { name, tag, status, startDate: start, endDate: end, memo });
      const id = res.id || taskIdCounter++;
      taskStore[id] = { id, name, tag, status, start, end, startFmt, endFmt, memo };
      showToast('✅ 任務已新增');
    } catch(e) { showToast('⚠ 新增失敗'); return; }
  }
  renderAllTaskCards(); renderGantt(); updateStats(); closeModal('taskModal');
}

async function removeTask(id) {
  if (!confirm('確定要刪除此任務？')) return;
  try {
    await apiPost('deleteTask', { id });
    delete taskStore[id];
    renderAllTaskCards(); renderGantt(); updateStats();
    showToast('🗑 任務已刪除');
  } catch(e) { showToast('⚠ 刪除失敗'); }
}

async function toggleTask(el, id) {
  el.classList.toggle('done');
  const isDone = el.classList.contains('done');
  const item = el.closest('.task-item');
  const title = item.querySelector('.task-title');
  title.classList.toggle('line-through', isDone);
  title.style.opacity = isDone ? '0.4' : '1';
  const newStatus = isDone ? 'done' : 'doing';
  if (taskStore[id]) taskStore[id].status = newStatus;
  updateStats();
  // 非同步更新 Sheets（不阻塞 UI）
  apiPost('updateTask', { ...taskStore[id], startDate: taskStore[id]?.start || '', endDate: taskStore[id]?.end || '' })
    .catch(() => showToast('⚠ 狀態同步失敗'));
}

// ============================================================
// API-CONNECTED TODO OPERATIONS
// ============================================================
async function submitTodo() {
  const text = document.getElementById('m-todo-text').value.trim();
  if (!text) { showToast('⚠ 請輸入待辦內容'); return; }
  const tag = pillState.todo || tags[0].id;

  if (editingTodoId !== null) {
    const item = todoStore.find(t => t.id === editingTodoId);
    if (!item) return;
    try {
      await apiPost('updateTodo', { id: item.id, text, tag, done: item.done });
      item.text = text; item.tag = tag;
      showToast('✅ 待辦已更新');
    } catch(e) { showToast('⚠ 更新失敗'); return; }
  } else {
    try {
      const res = await apiPost('addTodo', { text, tag });
      const id = res.id || todoIdCounter++;
      todoStore.push({ id, text, tag, done: false });
      showToast('✅ 待辦已新增');
    } catch(e) { showToast('⚠ 新增失敗'); return; }
  }
  renderTodos(); closeModal('todoModal');
}

async function toggleTodo(id, done) {
  const item = todoStore.find(t => t.id === id);
  if (!item) return;
  item.done = done;
  renderTodos();
  apiPost('updateTodo', { id: item.id, text: item.text, tag: item.tag, done })
    .catch(() => showToast('⚠ 狀態同步失敗'));
}

async function removeTodo(id) {
  try {
    await apiPost('deleteTodo', { id });
    todoStore = todoStore.filter(t => t.id !== id);
    renderTodos(); showToast('🗑 待辦已刪除');
  } catch(e) { showToast('⚠ 刪除失敗'); }
}

// ============================================================
// API-CONNECTED NOTE OPERATIONS
// ============================================================
async function submitNote() {
  const text = document.getElementById('m-note-text').value.trim();
  if (!text) { showToast('⚠ 請輸入備註內容'); return; }
  const tag  = pillState.note || tags[0].id;
  const date = document.getElementById('m-note-date').value || '';

  if (editingNoteId !== null) {
    const n = noteStore.find(n => n.id === editingNoteId);
    if (!n) return;
    try {
      await apiPost('updateNote', { id: n.id, content: text, tag, date });
      n.text = text; n.tag = tag; n.date = date;
      showToast('📝 備註已更新');
    } catch(e) { showToast('⚠ 更新失敗'); return; }
  } else {
    try {
      const res = await apiPost('addNote', { content: text, tag, date });
      const id = res.id || noteIdCounter++;
      noteStore.push({ id, text, tag, date });
      showToast('📝 備註已新增');
    } catch(e) { showToast('⚠ 新增失敗'); return; }
  }
  renderNotes(); closeModal('noteModal');
}

async function removeNote(id) {
  try {
    await apiPost('deleteNote', { id });
    noteStore = noteStore.filter(n => n.id !== id);
    renderNotes(); showToast('🗑 備註已刪除');
  } catch(e) { showToast('⚠ 刪除失敗'); }
}

// ============================================================
// API-CONNECTED CALENDAR OPERATIONS
// ============================================================
async function addFromCalendar() {
  const name = document.getElementById('cal-item-name').value.trim();
  if (!name || !selectedCalDate) return;
  const tag    = pillState.cal || tags[0].id;
  const status = document.getElementById('cal-item-status').value;
  const { y, m, d } = selectedCalDate;
  const pad = n => String(n).padStart(2,'0');
  const dateStr = `${y}-${pad(m)}-${pad(d)}`;
  const key = `${y}-${m}-${d}`;

  try {
    const res = await apiPost('addCalEvent', { name, tag, date: dateStr });
    if (!calEvents[key]) calEvents[key] = [];
    calEvents[key].push({ id: res.id, name, tag });

    if (currentPage === 'overview') renderCalendar();
    if (currentPage === 'calendar') renderCalendarPage();

    if (tag !== 'event') {
      const taskRes = await apiPost('addTask', { name, tag, status, startDate: dateStr, endDate: '', memo: '' });
      const id = taskRes.id || taskIdCounter++;
      taskStore[id] = { id, name, tag, status, start: dateStr, end: '', startFmt: `${pad(m)}/${pad(d)}`, endFmt: '', memo: '' };
      renderAllTaskCards(); renderGantt(); updateStats();
      showToast('✅ 任務新增並標記於日曆');
    } else {
      showToast('📅 公司活動已標記於日曆');
    }
  } catch(e) { showToast('⚠ 新增失敗'); return; }

  closeModal('calModal');
  if (currentPage === 'overview') calOverviewDayClick(d,'cal-event-panel-overview','cal-event-title-overview','cal-event-list-overview');
  else calPageDayClick(d);
}

async function removeCalEvent(key, idx) {
  const ev = calEvents[key]?.[idx];
  if (!ev) return;
  try {
    if (ev.id) await apiPost('deleteCalEvent', { id: ev.id });
    calEvents[key].splice(idx, 1);
    if (!calEvents[key].length) delete calEvents[key];
    if (currentPage === 'overview') renderCalendar();
    if (currentPage === 'calendar') renderCalendarPage();
    if (selectedCalDate) {
      if (currentPage === 'overview') calOverviewDayClick(selectedCalDate.d,'cal-event-panel-overview','cal-event-title-overview','cal-event-list-overview');
      else calPageDayClick(selectedCalDate.d);
    }
    showToast('🗑 日曆事件已移除');
  } catch(e) { showToast('⚠ 刪除失敗'); }
}

// ============================================================
// INIT
// ============================================================
init();
</script>
